<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Splash Score Center · Game Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Live play-by-play, social reactions, box score, win probability, and Polymarket-style markets — all in one place." />
  <link rel="preconnect" href="https://a.espncdn.com" crossorigin />
  <link rel="preconnect" href="https://site.api.espn.com" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css?v2026050203" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
</head>
<body data-page="game">
  <header class="nav">
    <a href="index.html" class="nav__logo" aria-label="Splash Score Center home">
      <img class="nav__logo-img" src="assets/splash-logo-white.svg" alt="splash sports" />
      <span class="nav__logo-tag">SCORE CENTER</span>
    </a>
    <nav>
      <ul class="nav__links">
        <li><a class="nav__link" data-page="home" href="index.html">Home</a></li>
        <li><a class="nav__link" data-page="scoreboard" href="scoreboard.html">Scoreboard</a></li>
        <li><a class="nav__link" data-page="game" href="game.html?id=401869417">Game Center</a></li>
      </ul>
    </nav>
    <div class="nav__right">
      <span class="nav__identity"></span>
    </div>
  </header>

  <div class="ticker" aria-label="Tonight's NBA games"></div>

  <div class="gc">
    <section class="gc__main">
      <header class="gc__header" id="gc-header"></header>
      <div class="gc__tabs" role="tablist">
        <button class="gc__tab is-active" role="tab" data-tab="pbp" aria-selected="true">Play-by-Play</button>
        <button class="gc__tab" role="tab" data-tab="boxscore">Box Score</button>
        <button class="gc__tab" role="tab" data-tab="markets">Markets</button>
        <button class="gc__tab" role="tab" data-tab="winprob">Win Probability</button>
      </div>
      <div class="gc__panels">
        <div class="gc__panel is-active" data-panel="pbp" id="panel-pbp"></div>
        <div class="gc__panel" data-panel="boxscore" id="panel-boxscore"></div>
        <div class="gc__panel" data-panel="markets" id="panel-markets"></div>
        <div class="gc__panel" data-panel="winprob" id="panel-winprob">
          <div class="wp-chart"><canvas id="winprob-chart"></canvas></div>
        </div>
      </div>
    </section>
    <aside class="gc-chat" id="game-chat"></aside>
  </div>

  <div class="chat-sheet" id="chat-sheet" role="dialog" aria-label="Game chat" aria-modal="true">
    <div class="chat-sheet__inner">
      <div class="chat-sheet__handle" aria-hidden="true"></div>
      <button class="chat-sheet__close" id="chat-sheet-close" aria-label="Close chat">×</button>
      <div id="chat-sheet-mount" style="flex:1;display:flex;flex-direction:column;min-height:0;"></div>
    </div>
  </div>

  <nav class="tabbar" aria-label="Primary">
    <a href="index.html" data-tab="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12L12 3l9 9"/><path d="M5 10v10h14V10"/></svg>
      <span>Home</span>
    </a>
    <a href="scoreboard.html" data-tab="scoreboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18M9 4v16"/></svg>
      <span>Scores</span>
    </a>
    <a href="game.html?id=401869417" data-tab="game" class="is-active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3v18M6 6c4 4 8 8 12 12M18 6c-4 4-8 8-12 12"/></svg>
      <span>Live</span>
    </a>
    <button type="button" class="tabbar__chat-btn" data-tab="chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:22px;height:22px;"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      <span>Chat</span>
      <span class="tabbar__chat-dot"></span>
    </button>
  </nav>

  <script type="module" src="assets/game.js?v2026050203"></script>
</body>
</html>
