  <header class="nav">

      <img class="nav__logo-img" src="assets/splash-logo-white.svg" alt="splash sports" />

    <nav>

        <li><a class="nav__link" data-page="home" href="index.html">Home</a></li>

      <div class="sport-filter" id="sport-filter" role="tablist" aria-label="Sport filter"></div>

    <div class="home-date" id="home-date" aria-label="Date selector"></div>

    <section class="tonight" id="tonight"></section>

    <section class="home-actions" id="home-actions" aria-label="Quick links"></section>

    <section class="home-panel" id="standings-panel" hidden>

      <div class="home-panel__body" id="standings-body"></div>

    <section class="home-panel" id="stats-panel" hidden>
      <div class="home-panel__header">
        <h2 class="home-panel__title">Player stats — season leaders</h2>
        <button class="home-panel__close" data-close-panel aria-label="Close stats">×</button>
