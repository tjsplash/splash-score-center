<body data-page="game">
  <header class="nav">
    <a href="index.html" class="nav__logo" aria-label="Splash Score Center home">
      <img class="nav__logo-img" src="assets/splash-logo-white.svg" alt="splash sports" />
      <span class="nav__logo-tag">SCORE CENTER</span>
    </a>
    <nav>
      <ul class="nav__links">
        <li><a class="nav__link" data-page="home" href="index.html">Home</a></li>
        <li><a class="nav__link" data-page="scoreboard" href="scoreboard.html">Scoreboard</a></li>
        <li><a class="nav__link is-active" data-page="game" href="pga-game.html">Game Center</a></li>

      <span class="nav__identity"></span>
    </div>

  <div class="ticker" aria-label="Tonight's games"></div>

    <div class="pga-gc__tabs" role="tablist">
      <button class="pga-gc__tab is-active" role="tab" data-tab="leaderboard" aria-selected="true">Leaderboard</button>
      <button class="pga-gc__tab" role="tab" data-tab="feed">Shot Feed</button>
      <button class="pga-gc__tab" role="tab" data-tab="player-stats">Player Stats</button>
      <button class="pga-gc__tab" role="tab" data-tab="course">Course Stats</button>
    </div>

    <div class="pga-gc__panels">
      <div class="pga-gc__panel is-active" data-panel="leaderboard" id="panel-leaderboard"></div>
      <div class="pga-gc__panel" data-panel="feed" id="panel-feed"></div>
      <div class="pga-gc__panel" data-panel="player-stats" id="panel-player-stats"></div>
      <div class="pga-gc__panel" data-panel="course" id="panel-course"></div>
    </div>
  </main>

  <nav class="tabbar" aria-label="Primary">
    <a href="index.html" data-tab="home">

  <script type="module" src="assets/pga-game.js?v2026050205"></script>
